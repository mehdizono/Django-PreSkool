{% extends 'Home/base.html' %}
{% block body %}
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Ajouter un département</h4>
        </div>
        <div class="card-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'add_department' %}">
                {% csrf_token %}
                
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="department_id" class="form-label">Department ID</label>
                        <input type="text" class="form-control" id="department_id" name="department_id" required>
                    </div>
                    <div class="col-md-4">
                        <label for="name" class="form-label">Department Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="col-md-4">
                        <label for="head_of_department" class="form-label">Head of Department</label>
                        <input type="text" class="form-control" id="head_of_department" name="head_of_department" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label for="start_date" class="form-label">Department Start Date</label>
                        <input type="date" class="form-control" id="start_date" name="start_date" required>
                    </div>
                    <div class="col-md-4">
                        <label for="no_of_students" class="form-label">Number of Students</label>
                        <input type="number" class="form-control" id="no_of_students" name="no_of_students" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
