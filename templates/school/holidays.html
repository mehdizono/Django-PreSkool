{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />

<div class="content container-fluid">
    
    <div class="page-header">
        <div class="row align-items-center">
            <div class="col">
                <h3 class="page-title">Holidays Calendar</h3>
                <ul class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Holidays</li>
                </ul>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-lg-12 col-md-12">
            <div class="card">
                <div class="card-body">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth', // Vue par mois par défaut
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      height: 650, // Ajuste la hauteur du calendrier
      
      // 4. On injecte les données Django directement dans le Javascript !
      events: [
        {% for holiday in holidays %}
        {
          title: '{{ holiday.name|escapejs }}', // Nom de la fête
          start: '{{ holiday.holiday_date|date:"Y-m-d" }}', // Format de date reconnu par le calendrier
          backgroundColor: '#3d5ee1', // Le joli bleu de Preskool
          borderColor: '#3d5ee1',
          textColor: '#ffffff'
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ]
    });
    
    calendar.render();
  });
</script>
{% endblock %}
